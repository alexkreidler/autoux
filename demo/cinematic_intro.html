* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: #F5F0E6;
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
}
#scene {
  width: 1920px;
  height: 1080px;
  position: relative;
  overflow: hidden;
}
#camera {
  position: absolute;
  top: 0; left: 0;
  width: 1920px;
  height: 1080px;
  transform-origin: 0 0;
  transform: scale(5) translate(-720.0px, -378.0px);
}
.cell {
  position: absolute;
  border: 1px solid #D4CFC4;
  overflow: hidden;
}
.cell.focal {
  border: 2px solid #8B7355;
  z-index: 10;
}
.avatar {
  position: absolute;
  top: 4px;
  left: 4px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  object-fit: cover;
  z-index: 20;
  border: 1px solid rgba(255,255,255,0.6);
}
#title {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: #1A1A1A;
  letter-spacing: 0.02em;
  opacity: 0;
  z-index: 100;
  width: 100%;
}
#overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #F5F0E6;
  opacity: 0;
  z-index: 200;
  pointer-events: none;
}
</style>

  <div id="overlay"></div>

<script>
// Animation state
const FPS = 30;
const TOTAL_FRAMES = 270; // 9s × 30fps

// Key animation values
const SCALE_START = 5;
const TX_START = -3600.0;  // absolute translate at scale=5
const TY_START = -1890.0;

// GSAP-style cubic bezier easing
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

const camera = document.getElementById('camera');
const title = document.getElementById('title');
const overlay = document.getElementById('overlay');

let currentFrame = 0;
let animating = false;

function setFrame(frame) {
  const t = frame / FPS;  // time in seconds
  
  // Phase 1: 0-1.5s — hold at scale 5 on focal cell
  // Phase 2: 1.5-6.5s — zoom out to scale 1
  // Phase 3: 6.5-8.5s — title fades in
  // Phase 4: 8.5-9.0s — fade to cream
  
  let scale, tx, ty;
  
  if (t <= 1.5) {
    // Hold with small pulse at t=0.75
    const pulse = 1 + 0.05 * Math.sin(t * Math.PI / 1.5 * 2);
    scale = SCALE_START * pulse;
    tx = TX_START;
    ty = TY_START;
  } else if (t <= 6.5) {
    // Zoom out
    const progress = (t - 1.5) / 5.0;
    const eased = easeInOutCubic(progress);
    scale = lerp(SCALE_START, 1.0, eased);
    tx = lerp(TX_START, 0, eased);
    ty = lerp(TY_START, 0, eased);
  } else {
    scale = 1.0;
    tx = 0;
    ty = 0;
  }
  
  camera.style.transform = `scale(${scale}) translate(${tx/scale}px, ${ty/scale}px)`;
  
  // Title fade in: 6.5s - 8.0s
  if (t <= 6.5) {
    title.style.opacity = 0;
  } else if (t <= 8.0) {
    title.style.opacity = (t - 6.5) / 1.5;
  } else {
    title.style.opacity = 1;
  }
  
  // Final fade: 8.5 - 9.0s
  if (t <= 8.5) {
    overlay.style.opacity = 0;
  } else {
    overlay.style.opacity = (t - 8.5) / 0.5;
  }
}

// Expose for puppeteer-driven capture
window.TOTAL_FRAMES = TOTAL_FRAMES;
window.setFrame = setFrame;
window.animationReady = true;

// Initialize to frame 0
setFrame(0);
</script>
