# === CHATWOOT (Customer Support) ===
apiVersion: v1
kind: Namespace
metadata:
  name: chatwoot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatwoot-db
  namespace: chatwoot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatwoot-db
  template:
    metadata:
      labels:
        app: chatwoot-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: chatwoot
        - name: POSTGRES_USER
          value: chatwoot
        - name: POSTGRES_PASSWORD
          value: chatwoot
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: chatwoot-db
  namespace: chatwoot
spec:
  selector:
    app: chatwoot-db
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatwoot-redis
  namespace: chatwoot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatwoot-redis
  template:
    metadata:
      labels:
        app: chatwoot-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: chatwoot-redis
  namespace: chatwoot
spec:
  selector:
    app: chatwoot-redis
  ports:
  - port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatwoot
  namespace: chatwoot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatwoot
  template:
    metadata:
      labels:
        app: chatwoot
    spec:
      initContainers:
      - name: db-prepare
        image: chatwoot/chatwoot:latest
        command: ["bundle", "exec", "rails", "db:chatwoot_prepare"]
        env:
        - name: RAILS_ENV
          value: "production"
        - name: SECRET_KEY_BASE
          value: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
        - name: POSTGRES_HOST
          value: "chatwoot-db"
        - name: POSTGRES_DATABASE
          value: "chatwoot"
        - name: POSTGRES_USERNAME
          value: "chatwoot"
        - name: POSTGRES_PASSWORD
          value: "chatwoot"
        - name: REDIS_URL
          value: "redis://chatwoot-redis:6379"
      containers:
      - name: chatwoot
        image: chatwoot/chatwoot:latest
        command: ["bundle", "exec", "rails", "s", "-b", "0.0.0.0", "-p", "3000"]
        ports:
        - containerPort: 3000
        env:
        - name: RAILS_ENV
          value: "production"
        - name: FRONTEND_URL
          value: "http://98.92.239.172:30115"
        - name: SECRET_KEY_BASE
          value: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
        - name: POSTGRES_HOST
          value: "chatwoot-db"
        - name: POSTGRES_DATABASE
          value: "chatwoot"
        - name: POSTGRES_USERNAME
          value: "chatwoot"
        - name: POSTGRES_PASSWORD
          value: "chatwoot"
        - name: REDIS_URL
          value: "redis://chatwoot-redis:6379"
        - name: RAILS_LOG_TO_STDOUT
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: chatwoot
  namespace: chatwoot
spec:
  type: NodePort
  selector:
    app: chatwoot
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30115
