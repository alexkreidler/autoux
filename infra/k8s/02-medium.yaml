# === PRESTASHOP (E-commerce) - Full demo shop with PS_DEMO_MODE ===
apiVersion: v1
kind: Namespace
metadata:
  name: prestashop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prestashop-db
  namespace: prestashop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prestashop-db
  template:
    metadata:
      labels:
        app: prestashop-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: prestashop
        - name: MYSQL_DATABASE
          value: prestashop
        ports:
        - containerPort: 3306
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: prestashop-db
  namespace: prestashop
spec:
  selector:
    app: prestashop-db
  ports:
  - port: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prestashop
  namespace: prestashop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prestashop
  template:
    metadata:
      labels:
        app: prestashop
    spec:
      containers:
      - name: prestashop
        image: prestashop/prestashop:latest
        ports:
        - containerPort: 80
        env:
        - name: PS_INSTALL_AUTO
          value: "1"
        - name: PS_DEMO_MODE
          value: "1"
        - name: PS_DOMAIN
          value: "98.92.239.172:30110"
        - name: DB_SERVER
          value: "prestashop-db"
        - name: DB_NAME
          value: "prestashop"
        - name: DB_USER
          value: "root"
        - name: DB_PASSWD
          value: "prestashop"
        - name: ADMIN_MAIL
          value: "demo@prestashop.com"
        - name: ADMIN_PASSWD
          value: "prestashop_demo"
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: prestashop
  namespace: prestashop
spec:
  type: NodePort
  selector:
    app: prestashop
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30110
---
