# === HULY ===
apiVersion: v1
kind: Namespace
metadata:
  name: huly
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: huly-mongo
  namespace: huly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: huly-mongo
  template:
    metadata:
      labels:
        app: huly-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:7
        args: ["--replSet", "rs0"]
        ports:
        - containerPort: 27017
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: huly-mongo
  namespace: huly
spec:
  selector:
    app: huly-mongo
  ports:
  - port: 27017
---
apiVersion: batch/v1
kind: Job
metadata:
  name: huly-mongo-init
  namespace: huly
spec:
  template:
    spec:
      containers:
      - name: init
        image: mongo:7
        command: ["bash", "-c", "sleep 10 && mongosh --host huly-mongo --eval 'rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"huly-mongo:27017\"}]})'"]
      restartPolicy: OnFailure
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: huly-elastic
  namespace: huly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: huly-elastic
  template:
    metadata:
      labels:
        app: huly-elastic
    spec:
      containers:
      - name: elasticsearch
        image: elasticsearch:7.17.24
        env:
        - name: discovery.type
          value: single-node
        - name: ES_JAVA_OPTS
          value: "-Xms256m -Xmx256m"
        - name: xpack.security.enabled
          value: "false"
        ports:
        - containerPort: 9200
        resources:
          requests: { memory: "384Mi", cpu: "100m" }
          limits: { memory: "640Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: huly-elastic
  namespace: huly
spec:
  selector:
    app: huly-elastic
  ports:
  - port: 9200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: huly-minio
  namespace: huly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: huly-minio
  template:
    metadata:
      labels:
        app: huly-minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args: ["server", "/data", "--console-address", ":9001"]
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        ports:
        - containerPort: 9000
        resources:
          requests: { memory: "64Mi", cpu: "50m" }
          limits: { memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: huly-minio
  namespace: huly
spec:
  selector:
    app: huly-minio
  ports:
  - port: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: huly
  namespace: huly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: huly
  template:
    metadata:
      labels:
        app: huly
    spec:
      containers:
      - name: huly
        image: hardcoreeng/huly:latest
        ports:
        - containerPort: 8083
        env:
        - name: HULY_SECRET
          value: "usersim-huly-secret-key-change-me"
        - name: SERVER_ADDRESS
          value: "0.0.0.0"
        - name: ACCOUNTS_URL
          value: "http://huly.usersim.alexkreidler.com"
        - name: MONGO_URL
          value: "mongodb://huly-mongo:27017/huly?replicaSet=rs0"
        - name: ELASTIC_URL
          value: "http://huly-elastic:9200"
        - name: MINIO_ENDPOINT
          value: "huly-minio"
        - name: MINIO_ACCESS_KEY
          value: "minioadmin"
        - name: MINIO_SECRET_KEY
          value: "minioadmin"
        resources:
          requests: { memory: "512Mi", cpu: "200m" }
          limits: { memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: huly
  namespace: huly
spec:
  selector:
    app: huly
  ports:
  - port: 8083
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: huly
  namespace: huly
spec:
  rules:
  - host: huly.usersim.alexkreidler.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: huly
            port:
              number: 8083
