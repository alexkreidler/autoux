# === ERPNEXT ===
apiVersion: v1
kind: Namespace
metadata:
  name: erpnext
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erpnext-db
  namespace: erpnext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erpnext-db
  template:
    metadata:
      labels:
        app: erpnext-db
    spec:
      containers:
      - name: mariadb
        image: mariadb:10.11
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: admin
        - name: MYSQL_DATABASE
          value: erpnext
        - name: MYSQL_USER
          value: erpnext
        - name: MYSQL_PASSWORD
          value: erpnext
        args: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci", "--skip-character-set-client-handshake", "--skip-innodb-read-only-compressed"]
        ports:
        - containerPort: 3306
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: erpnext-db
  namespace: erpnext
spec:
  selector:
    app: erpnext-db
  ports:
  - port: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erpnext-redis-cache
  namespace: erpnext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erpnext-redis-cache
  template:
    metadata:
      labels:
        app: erpnext-redis-cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests: { memory: "8Mi", cpu: "10m" }
          limits: { memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: erpnext-redis-cache
  namespace: erpnext
spec:
  selector:
    app: erpnext-redis-cache
  ports:
  - port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erpnext-redis-queue
  namespace: erpnext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erpnext-redis-queue
  template:
    metadata:
      labels:
        app: erpnext-redis-queue
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "--port", "6380"]
        ports:
        - containerPort: 6380
        resources:
          requests: { memory: "8Mi", cpu: "10m" }
          limits: { memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: erpnext-redis-queue
  namespace: erpnext
spec:
  selector:
    app: erpnext-redis-queue
  ports:
  - port: 6380
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erpnext
  namespace: erpnext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erpnext
  template:
    metadata:
      labels:
        app: erpnext
    spec:
      containers:
      - name: erpnext
        image: frappe/erpnext:v15
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: erpnext-db
        - name: DB_PORT
          value: "3306"
        - name: REDIS_CACHE
          value: "redis://erpnext-redis-cache:6379"
        - name: REDIS_QUEUE
          value: "redis://erpnext-redis-queue:6380"
        - name: LETSENCRYPT_EMAIL
          value: ""
        - name: FRAPPE_SITE_NAME_HEADER
          value: "erpnext.usersim.alexkreidler.com"
        resources:
          requests: { memory: "512Mi", cpu: "200m" }
          limits: { memory: "1536Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: erpnext
  namespace: erpnext
spec:
  selector:
    app: erpnext
  ports:
  - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erpnext
  namespace: erpnext
spec:
  rules:
  - host: erpnext.usersim.alexkreidler.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erpnext
            port:
              number: 8080
---
# === ZAMMAD ===
apiVersion: v1
kind: Namespace
metadata:
  name: zammad
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zammad-db
  namespace: zammad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zammad-db
  template:
    metadata:
      labels:
        app: zammad-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: zammad
        - name: POSTGRES_USER
          value: zammad
        - name: POSTGRES_PASSWORD
          value: zammad
        ports:
        - containerPort: 5432
        resources:
          requests: { memory: "64Mi", cpu: "50m" }
          limits: { memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: zammad-db
  namespace: zammad
spec:
  selector:
    app: zammad-db
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zammad-es
  namespace: zammad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zammad-es
  template:
    metadata:
      labels:
        app: zammad-es
    spec:
      containers:
      - name: elasticsearch
        image: bitnami/elasticsearch:8
        env:
        - name: discovery.type
          value: single-node
        - name: ES_JAVA_OPTS
          value: "-Xms256m -Xmx256m"
        ports:
        - containerPort: 9200
        resources:
          requests: { memory: "384Mi", cpu: "100m" }
          limits: { memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: zammad-es
  namespace: zammad
spec:
  selector:
    app: zammad-es
  ports:
  - port: 9200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zammad-redis
  namespace: zammad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zammad-redis
  template:
    metadata:
      labels:
        app: zammad-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests: { memory: "8Mi", cpu: "10m" }
          limits: { memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: zammad-redis
  namespace: zammad
spec:
  selector:
    app: zammad-redis
  ports:
  - port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zammad-memcached
  namespace: zammad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zammad-memcached
  template:
    metadata:
      labels:
        app: zammad-memcached
    spec:
      containers:
      - name: memcached
        image: memcached:alpine
        ports:
        - containerPort: 11211
        resources:
          requests: { memory: "32Mi", cpu: "10m" }
          limits: { memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: zammad-memcached
  namespace: zammad
spec:
  selector:
    app: zammad-memcached
  ports:
  - port: 11211
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zammad
  namespace: zammad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zammad
  template:
    metadata:
      labels:
        app: zammad
    spec:
      initContainers:
      - name: init
        image: ghcr.io/zammad/zammad:latest
        command: ["bash", "-c", "rsync -a /opt/zammad/ /shared/ || true"]
        volumeMounts:
        - name: zammad-data
          mountPath: /shared
        resources:
          requests: { memory: "128Mi", cpu: "50m" }
          limits: { memory: "512Mi" }
      containers:
      - name: railsserver
        image: ghcr.io/zammad/zammad:latest
        command: ["zammad", "run", "rails"]
        ports:
        - containerPort: 3000
        env:
        - name: POSTGRESQL_HOST
          value: zammad-db
        - name: POSTGRESQL_DB
          value: zammad
        - name: POSTGRESQL_USER
          value: zammad
        - name: POSTGRESQL_PASS
          value: zammad
        - name: ELASTICSEARCH_HOST
          value: zammad-es
        - name: ELASTICSEARCH_PORT
          value: "9200"
        - name: MEMCACHE_SERVERS
          value: "zammad-memcached:11211"
        - name: REDIS_URL
          value: "redis://zammad-redis:6379"
        volumeMounts:
        - name: zammad-data
          mountPath: /opt/zammad
        resources:
          requests: { memory: "384Mi", cpu: "100m" }
          limits: { memory: "768Mi" }
      volumes:
      - name: zammad-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: zammad
  namespace: zammad
spec:
  selector:
    app: zammad
  ports:
  - port: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zammad
  namespace: zammad
spec:
  rules:
  - host: zammad.usersim.alexkreidler.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: zammad
            port:
              number: 3000
---
