# === METABASE (BI/Analytics) - Built-in sample DB + dashboards ===
apiVersion: v1
kind: Namespace
metadata:
  name: metabase
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: metabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
      - name: metabase
        image: metabase/metabase:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
        env:
        - name: JAVA_OPTS
          value: "-Xmx1g"
---
apiVersion: v1
kind: Service
metadata:
  name: metabase
  namespace: metabase
spec:
  type: NodePort
  selector:
    app: metabase
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30100
---
