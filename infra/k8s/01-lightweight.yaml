          value: "http://98.92.239.172:30103"
        - name: database__client
          value: "sqlite3"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ghost
  namespace: ghost
spec:
  type: NodePort
  selector:
    app: ghost
  ports:
  - port: 2368
    targetPort: 2368
    nodePort: 30103
---
# === LISTMONK (Newsletter) - Go binary, needs Postgres ===
apiVersion: v1
kind: Namespace
metadata:
  name: listmonk
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: listmonk-db
  namespace: listmonk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: listmonk-db
  template:
    metadata:
      labels:
        app: listmonk-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: listmonk
        - name: POSTGRES_USER
          value: listmonk
        - name: POSTGRES_PASSWORD
          value: listmonk
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: listmonk-db
  namespace: listmonk
spec:
  selector:
    app: listmonk-db
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: listmonk
  namespace: listmonk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: listmonk
  template:
    metadata:
      labels:
        app: listmonk
    spec:
      initContainers:
      - name: wait-db
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z listmonk-db 5432; do sleep 2; done']
      containers:
      - name: listmonk
        image: listmonk/listmonk:latest
        command: ["sh", "-c", "./listmonk --install --idempotent --yes && ./listmonk"]
        ports:
        - containerPort: 9000
        env:
        - name: LISTMONK_app__address
          value: "0.0.0.0:9000"
        - name: LISTMONK_app__admin_username
          value: "admin"
        - name: LISTMONK_app__admin_password
          value: "admin"
        - name: LISTMONK_db__host
          value: "listmonk-db"
        - name: LISTMONK_db__port
          value: "5432"
        - name: LISTMONK_db__user
          value: "listmonk"
        - name: LISTMONK_db__password
          value: "listmonk"
        - name: LISTMONK_db__database
          value: "listmonk"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: listmonk
  namespace: listmonk
spec:
  type: NodePort
  selector:
    app: listmonk
  ports:
  - port: 9000
    targetPort: 9000
    nodePort: 30104
---
