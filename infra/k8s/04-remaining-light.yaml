      app: mastodon-redis
  template:
    metadata:
      labels:
        app: mastodon-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests: { memory: "8Mi", cpu: "10m" }
          limits: { memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: mastodon-redis
  namespace: mastodon
spec:
  selector:
    app: mastodon-redis
  ports:
  - port: 6379
---
