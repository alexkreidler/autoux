  DB_PASS: "mastodon"
  REDIS_HOST: "mastodon-redis"
  REDIS_PORT: "6379"
  SECRET_KEY_BASE: "a]UEg3nhFfW29g7t8kLcR4pM5xN2bQ6dYhVj0Sv1Zw9JmAoXi8BDp3Tq5Ky7Hu"
  OTP_SECRET: "b]VFh4oiG4xH0h8uMdS5qN6yO3cR7eZi1Kw0Tw2Ax8KnBpYj9CEq4Ur6Lz8Iv"
  VAPID_PRIVATE_KEY: "Y0lJQzFfVGhpc0lzQUZha2VLZXlGb3JEZW1vUHVycG9zZXM="
  VAPID_PUBLIC_KEY: "QkFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQQ=="
  SMTP_SERVER: "localhost"
  SMTP_PORT: "25"
  SMTP_FROM_ADDRESS: "mastodon@usersim.alexkreidler.com"
---
apiVersion: batch/v1
kind: Job
