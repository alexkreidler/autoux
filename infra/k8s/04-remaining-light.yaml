  name: mastodon-web
  namespace: mastodon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mastodon-web
  template:
    metadata:
      labels:
        app: mastodon-web
    spec:
      containers:
      - name: web
        image: ghcr.io/mastodon/mastodon:v4.3
        command: ["bash", "-c", "bundle exec rails s -p 3000 -b 0.0.0.0"]
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: mastodon-env
        resources:
          requests: { memory: "384Mi", cpu: "100m" }
          limits: { memory: "640Mi" }
      - name: sidekiq
        image: ghcr.io/mastodon/mastodon:v4.3
        command: ["bash", "-c", "bundle exec sidekiq"]
        envFrom:
        - configMapRef:
            name: mastodon-env
        resources:
          requests: { memory: "256Mi", cpu: "50m" }
          limits: { memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: mastodon-web
  namespace: mastodon
spec:
  selector:
    app: mastodon-web
  ports:
  - port: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mastodon
  namespace: mastodon
spec:
  rules:
  - host: mastodon.usersim.alexkreidler.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mastodon-web
            port:
              number: 3000
