  name: mastodon-db
  namespace: mastodon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mastodon-db
  template:
    metadata:
      labels:
        app: mastodon-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: mastodon
        - name: POSTGRES_USER
          value: mastodon
        - name: POSTGRES_PASSWORD
          value: mastodon
        ports:
        - containerPort: 5432
        resources:
          requests: { memory: "64Mi", cpu: "50m" }
          limits: { memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: mastodon-db
  namespace: mastodon
spec:
  selector:
    app: mastodon-db
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mastodon-redis
  namespace: mastodon
spec:
  replicas: 1
  selector:
