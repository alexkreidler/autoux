# === MATTERMOST ===
apiVersion: v1
kind: Namespace
metadata:
  name: mattermost
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost-db
  namespace: mattermost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattermost-db
  template:
    metadata:
      labels:
        app: mattermost-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: mattermost
        - name: POSTGRES_USER
          value: mattermost
        - name: POSTGRES_PASSWORD
          value: mattermost
        ports:
        - containerPort: 5432
        resources:
          requests: { memory: "64Mi", cpu: "50m" }
          limits: { memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: mattermost-db
  namespace: mattermost
spec:
  selector:
    app: mattermost-db
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost
  namespace: mattermost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattermost
  template:
    metadata:
      labels:
        app: mattermost
    spec:
      containers:
      - name: mattermost
        image: mattermost/mattermost-team-edition:latest
        ports:
        - containerPort: 8065
        env:
        - name: MM_SQLSETTINGS_DRIVERNAME
          value: "postgres"
        - name: MM_SQLSETTINGS_DATASOURCE
          value: "postgres://mattermost:mattermost@mattermost-db:5432/mattermost?sslmode=disable"
        - name: MM_SERVICESETTINGS_SITEURL
          value: "http://mattermost.usersim.alexkreidler.com"
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: mattermost
  namespace: mattermost
spec:
  selector:
    app: mattermost
  ports:
  - port: 8065
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mattermost
  namespace: mattermost
spec:
  rules:
  - host: mattermost.usersim.alexkreidler.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mattermost
            port:
              number: 8065
---
# === ROCKET.CHAT ===
apiVersion: v1
kind: Namespace
metadata:
  name: rocketchat
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketchat-db
  namespace: rocketchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketchat-db
  template:
    metadata:
      labels:
        app: rocketchat-db
    spec:
      containers:
      - name: mongo
        image: mongo:6
        args: ["--replSet", "rs0", "--oplogSize", "128"]
        ports:
        - containerPort: 27017
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits: { memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: rocketchat-db
  namespace: rocketchat
spec:
  selector:
    app: rocketchat-db
  ports:
  - port: 27017
---
# Mongo needs replica set init
apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-init-rs
  namespace: rocketchat
spec:
  template:
    spec:
      containers:
      - name: init
        image: mongo:6
        command: ["bash", "-c", "sleep 10 && mongosh --host rocketchat-db --eval 'rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"rocketchat-db:27017\"}]})'"]
      restartPolicy: OnFailure
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketchat
  namespace: rocketchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketchat
  template:
    metadata:
      labels:
        app: rocketchat
    spec:
      initContainers:
      - name: wait-db
        image: mongo:6
        command: ["bash", "-c", "until mongosh --host rocketchat-db --eval 'rs.status()' 2>/dev/null | grep -q PRIMARY; do sleep 5; done"]
      containers:
      - name: rocketchat
        image: rocket.chat:latest
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URL
          value: "mongodb://rocketchat-db:27017/rocketchat?replicaSet=rs0"
        - name: MONGO_OPLOG_URL
          value: "mongodb://rocketchat-db:27017/local?replicaSet=rs0"
        - name: ROOT_URL
          value: "http://rocketchat.usersim.alexkreidler.com"
        resources:
          requests: { memory: "1Gi", cpu: "200m" }
          limits: { memory: "3Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: rocketchat
  namespace: rocketchat
spec:
  selector:
    app: rocketchat
  ports:
  - port: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rocketchat
  namespace: rocketchat
spec:
  rules:
  - host: rocketchat.usersim.alexkreidler.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rocketchat
            port:
              number: 3000
---
# === MASTODON ===
