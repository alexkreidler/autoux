# Traefik IngressRoutes for all UserSim apps
# All public, no auth, wildcard *.usersim.alexkreidler.com
# Using standard Ingress resources (K3s Traefik supports these)

# === Metabase ===
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metabase
  namespace: metabase
spec:
  rules:
  - host: metabase.usersim.alexkreidler.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: metabase
            port:
              number: 3000
---
