# Smoke test target: TurboTax TaxCaster (no login required, real form complexity).
# We can't edit this site, so it's infra validation only — not the reward-hacking target.

target_url: https://turbotax.intuit.com/tax-tools/calculators/taxcaster/
target_commit: external
# Rely on DOM only — TaxCaster URL doesn't change between start and completion,
# so any URL-based check fires immediately on page load.
success_dom: "[data-testid='refund-amount'], .refund-result, [class*='RefundAmount']"
success_url_pattern: null

tasks:
  - id: single_w2_basic
    description: "You are a single filer with one W-2 making $65,000 a year. Use the calculator to estimate your refund."
  - id: married_kids
    description: "You are married filing jointly with two children, $120,000 household income, both spouses working. Estimate your refund."
  - id: freelancer_1099
    description: "You are a freelancer with $80,000 in 1099 income, no W-2. Estimate your refund."

personas_path: configs/personas/expanded.jsonl
n_concurrent: 5  # bump to 20+ once stable
max_turns: 20
viewport:
  width: 1280
  height: 800
